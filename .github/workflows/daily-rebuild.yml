name: Daily rebuild (publish new posts)

# Runs every day at 06:30 IST (01:00 UTC) to pick up any new markdown files
# pushed from the Obsidian vault via the Obsidian Git plugin.
# Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'posts/**'

jobs:
  trigger-vercel:
    name: Trigger Vercel deploy hook
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set. Add it under Repo → Settings → Secrets → Actions."
            exit 1
          fi
          echo "Triggering Vercel rebuild..."
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          echo "✔ Vercel rebuild triggered."
